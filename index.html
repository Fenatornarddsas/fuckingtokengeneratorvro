<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Token Generator 🤑</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 1.4rem;
      font-size: 13px;
      color: #856404;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 1.4rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .field { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 5px;
    }
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #e55;
      border-radius: 7px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: white;
      color: #333;
    }
    input:focus, select:focus { border-color: #c00; }
    .row-selects {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .row-selects select { flex: 1; }
    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .checkbox-row input { margin-top: 2px; width: 16px; height: 16px; flex-shrink: 0; }
    .checkbox-row span { font-size: 13px; color: #666; }
    .success-box {
      display: none;
      align-items: center;
      gap: 10px;
      background: #f0fff4;
      border: 1px solid #38a169;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 1rem;
    }
    .success-box .icon { font-size: 20px; }
    .success-box .text { font-size: 15px; font-weight: 600; color: #276749; }
    .get-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(90deg, #63b3ed, #4299e1);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .get-btn:hover { opacity: 0.92; }
    .get-btn:active { transform: scale(0.98); }
    .get-btn.success { background: #38a169; }
    .fine-print {
      font-size: 11px;
      color: #aaa;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="warning">
      ⚠️ <strong>THIS IS A JOKE / PRANK PAGE.</strong> No data is collected, no tokens are generated. Just for laughs.
    </div>

    <h1>Token Generator 🤑🤑🤑🤑🤑</h1>

    <div class="field">
      <label>Your card number</label>
      <input type="text" placeholder="RADIUM-ABCD-EFGH-IJKL-MNOP" />
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="Nutz4VR" />
    </div>

    <div class="field">
      <label>How much tokens you want</label>
      <input type="password" placeholder="••••••••••" />
    </div>

    <div class="field">
      <label>Your CVV Code</label>
      <input type="password" placeholder="••••••••••" />
    </div>

    <div class="row-selects">
      <select>
        <option>Month</option>
        <option>01</option><option>02</option><option>03</option>
        <option>04</option><option>05</option><option>06</option>
        <option>07</option><option>08</option><option>09</option>
        <option>10</option><option>11</option><option>12</option>
      </select>
      <select>
        <option>Year</option>
        <option>2025</option><option>2026</option>
        <option>2027</option><option>2028</option>
      </select>
      <select>
        <option>Country</option>
        <option>Ukraine</option><option>USA</option><option>UK</option>
        <option>Germany</option><option>France</option>
      </select>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="agree" checked />
      <span>I agree to give all my tokens to a random stranger on the internet</span>
    </div>

    <div class="success-box" id="success-box">
      <span class="icon">✅</span>
      <span class="text">Успіх! (Not really lol)</span>
    </div>

    <button class="get-btn" id="get-btn" onclick="triggerSuccess()">
      Get tokens 🤑🤑🤑🤑🤑
    </button>

    <p class="fine-print">100% totally real token generator™ — definitely not a prank</p>
  </div>

  <script>
    function triggerSuccess() {
      var box = document.getElementById('success-box');
      var btn = document.getElementById('get-btn');
      box.style.display = 'flex';
      btn.textContent = '🎉 Tokens received! (gotcha)';
      btn.classList.add('success');
      btn.onclick = null;
    }
  </script>
</body>
</html>
